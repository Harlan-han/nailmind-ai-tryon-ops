version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nailmind
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nailmind
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai-service:8001
      - CORS_ORIGINS=http://123.207.77.38:3001
      - SECRET_KEY=nailmind-prod-secret-2024
    depends_on:
      - postgres
      - redis
    volumes:
      - backend_uploads:/app/uploads

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    ports:
      - "8003:8001"
    environment:
      - BACKEND_WEBHOOK_URL=http://backend:8000/api/tryon/webhook/result
    volumes:
      - ai_uploads:/app/uploads

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_ORIGIN=http://backend:8000
        - NEXT_PUBLIC_AI_SERVICE_ORIGIN=http://ai-service:8001
        - NEXT_PUBLIC_API_BASE_URL=/api
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
    depends_on:
      - backend
      - ai-service

volumes:
  postgres_data:
  backend_uploads:
  ai_uploads:
